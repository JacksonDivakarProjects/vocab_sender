name: vocab_sender

on:
  schedule:
    - cron: "*/30 * * * *"

  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Pull Docker image
        run: docker pull jackdiva/vocab_sender:latest

      - name: Run vocab sender
        run: |
          docker run --rm \
            -e OPENROUTER_API_KEY="${{ secrets.OPENROUTER_API_KEY }}" \
            -e TELEGRAM_BOT_TOKEN="${{ secrets.TELEGRAM_BOT_TOKEN }}" \
            -e TELEGRAM_CHAT_ID="${{ secrets.TELEGRAM_CHAT_ID }}" \
            jackdiva/vocab_sender:latest
